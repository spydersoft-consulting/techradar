defaultPodOptions:
  imagePullSecrets:
    - name: cr-spydersoft-github

controllers:
  main:
    enabled: false
  frontend:
    enabled: true
    containers:
      main:
        type: deployment
        replicas: 1
        strategy: RollingUpdate
        image:
          repository: ghcr.io/spydersoft-consulting/techradar-frontend
          tag: latest
          pullPolicy: IfNotPresent
        # frontend's reverse-proxy target for data-api's Service within this
        # same release/namespace. Both controllers live in one release, so
        # bjw-s names the Service "<fullname>-data-api" -- computed here via
        # the chart's own naming helper rather than hardcoded (the baked-in
        # appsettings.json default, http://techradar-data-api/, is stale:
        # it matched an older topology where data-api's own release name
        # made bjw-s collapse to a bare "techradar-data-api" Service name).
        env:
          - name: OidcProxySettings__ReverseProxy__Clusters__techRadarApi__Destinations__techRadarApi/destination1__Address
            value: 'http://{{ include "techradar.fullname" . }}-data-api/'
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
  data-api:
    enabled: true
    containers:
      main:
        type: deployment
        replicas: 1
        strategy: RollingUpdate
        image:
          repository: ghcr.io/spydersoft-consulting/techradar-data-api
          tag: latest
          pullPolicy: IfNotPresent
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
service:
  main:
    enabled: false
  frontend:
    enabled: true
    controller: frontend
    nameOverride: frontend
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        targetPort: 8080
  data-api:
    enabled: true
    controller: data-api
    nameOverride: data-api
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        targetPort: 8080

route:
  main:
    enabled: false
  frontend:
    parentRefs:
      - name: main
        namespace: envoy-gateway-system
        group: gateway.networking.k8s.io
        kind: Gateway
    # No default hostnames -- this is environment-specific and must be
    # supplied by the consuming helm-config (e.g. techradar-helm-config
    # sets this per-environment from its own environment_hostname value).
    hostnames: []
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: frontend
            port: 80
