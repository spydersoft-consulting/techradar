## Build Pipeline - Build, publish container images, and update helmfile config
resources:
  repositories:
    - repository: templates
      type: github
      endpoint: spydersoft-gh
      name: spydersoft-consulting/azure-devops-templates
    - repository: helmfileconfig
      type: github
      endpoint: spydersoft-gh
      name: spydersoft-consulting/techradar-helm-config

trigger:
  tags:
    include:
      - "*"
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md

pr:
  branches:
    include:
      - main

extends:
  template: pipelines/build-multi-container/v1.yml@templates
  parameters:
    gitVersionSpec: '6.0.x'
    netCoreVersion: '10.0.x'
    externalFeedCredentials: SpydersoftGithub
    containerRegistryName: github-spydersoft-docker
    helmfileRepoName: helmfileconfig

    # Not '**/*.sln': Spydersoft.TechRadar.Frontend.sln is gitignored in the
    # original techradar-frontend repo (*.sln under "Editor files") and was
    # never actually committed, so it doesn't exist in this repo either.
    # A csproj glob builds every project directly regardless of solution
    # file presence, matching how techradar-data-api's original standalone
    # pipeline built (buildProject: src/**/*.csproj).
    buildProject: '**/*.csproj'

    publishProjects:
      - name: dataApi
        project: data-api/src/Spydersoft.TechRadar.Data.Api/Spydersoft.TechRadar.Data.Api.csproj
        artifactName: techradarDataApi
      - name: frontend
        project: frontend/src/Spydersoft.TechRadar.Frontend/Spydersoft.TechRadar.Frontend.csproj
        artifactName: techradarFrontend

    uiEnabled: true
    uiSourceDirectory: frontend/src/techradar-ui

    dockerImages:
      - name: dataApi
        dockerImageName: spydersoft-consulting/techradar-data-api
        dockerFilePath: data-api/Dockerfile
        artifactName: techradarDataApi
        artifactZipName: Spydersoft.TechRadar.Data.Api
      - name: frontend
        dockerImageName: spydersoft-consulting/techradar-frontend
        dockerFilePath: frontend/Dockerfile
        artifactName: techradarFrontend
        artifactZipName: Spydersoft.TechRadar.Frontend

    helmCharts:
      - name: techradar
        chartPath: charts/techradar

    # chart_publish runs in parallel with docker_publish (both depend only
    # on Build) -- updateHelmConfig must explicitly wait on both, since the
    # template's own default only waits on docker_publish.
    updateHelmConfigDependsOn:
      - docker_publish
      - chart_publish

    # Three build shapes:
    #  - PR: build/test/sonar only, no publish, no helm-config update.
    #  - main: beta build (GitVersion tags X.Y.Z-beta.<n> per GitVersion.yml's
    #    `main` branch config) -> publish images, update helm-config's test
    #    environment. Still runs sonar since this is now a real build path,
    #    not just a skip case.
    #  - anything else (a tag push): release build (unlabeled X.Y.Z) ->
    #    publish images, ALSO update helm-config's test environment --
    #    helm-config's own process-cicd.ps1/test.yml decide from there
    #    whether to auto-promote to stage (gated on the version being
    #    unlabeled, not on which branch built it). No sonar re-analysis
    #    (mirrors the prior convention of not re-scanning release/tag builds).
    ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
      updateHelmConfig: false
      buildAndPublishDockerImages: false
      buildAndPublishHelmCharts: false
      executeSonar: true
      uiExecuteSonar: true
    ${{ elseif eq(variables['Build.SourceBranchName'], 'main') }}:
      updateHelmConfig: true
      buildAndPublishDockerImages: true
      buildAndPublishHelmCharts: true
      executeSonar: true
      uiExecuteSonar: true
    ${{ else }}:
      updateHelmConfig: true
      buildAndPublishDockerImages: true
      buildAndPublishHelmCharts: true
      executeSonar: false
      uiExecuteSonar: false

    helmTagsCollection: "data_api=$(build.buildnumber),frontend=$(build.buildnumber),chart_version=$(build.buildnumber)"

    executeTests: true
    testProjects: '**/*.Tests/*.csproj'

    useSonarCloud: true
    sonarCloudOrganization: spydersoft-consulting
    sonarEndpointName: sonarcloud-spydersoft
    sonarProjectKey: spydersoft-consulting_techradar
    sonarProjectName: techradar
    sonarExtraProperties: |
      sonar.exclusions=**/data-api/**/Migrations/**/*,**/frontend/src/techradar-ui/**/*
      sonar.scanner.scanAll=false
      sonar.coverage.exclusions=**/*Program.cs,**/*Controller.cs

    uiSonarEndpointName: sonarcloud-spydersoft
    uiSonarCloudOrganization: spydersoft-consulting
    uiUseSonarCloud: true
    uiSonarConfigFile: react-sonar-project.properties
    uiCodeCoverageFile: frontend/src/techradar-ui/output/coverage/cobertura-coverage.xml
    uiUnitTestFile: frontend/src/techradar-ui/output/test/junit.xml
