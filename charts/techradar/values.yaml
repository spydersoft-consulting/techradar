# Vault path prefix used to look up secrets (secrets-k8/<vaultPathPrefix>/<env_name>/...).
# Override this if reusing this chart under a different app/vault layout.
vaultPathPrefix: techradar

# The Postgres instance data-api connects to. Defaults to the service name
# techradar-helm-config's own postgres release creates (techradar-postgres)
# and the database name it provisions -- override both to point at a
# different in-cluster service or an external/managed Postgres instance.
postgres:
  host: techradar-postgres
  database: techradar

defaultPodOptions:
  imagePullSecrets:
    - name: cr-spydersoft-github

controllers:
  main:
    enabled: false
  frontend:
    enabled: true
    containers:
      main:
        type: deployment
        replicas: 1
        strategy: RollingUpdate
        image:
          repository: ghcr.io/spydersoft-consulting/techradar-frontend
          tag: latest
          pullPolicy: IfNotPresent
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
  data-api:
    enabled: true
    containers:
      main:
        type: deployment
        replicas: 1
        strategy: RollingUpdate
        image:
          repository: ghcr.io/spydersoft-consulting/techradar-data-api
          tag: latest
          pullPolicy: IfNotPresent
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /livez
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: 8080
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
service:
  main:
    enabled: false
  frontend:
    enabled: true
    controller: frontend
    nameOverride: frontend
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        targetPort: 8080
  data-api:
    enabled: true
    controller: data-api
    nameOverride: data-api
    primary: true
    type: ClusterIP
    ports:
      http:
        enabled: true
        primary: true
        port: 80
        targetPort: 8080

route:
  main:
    enabled: false
  frontend:
    parentRefs:
      - name: main
        namespace: envoy-gateway-system
        group: gateway.networking.k8s.io
        kind: Gateway
    hostnames:
      - test.mattgerega.net
    rules:
      - matches:
          - path:
              type: PathPrefix
              value: /
        backendRefs:
          - identifier: frontend
            port: 80

env_name: dev
